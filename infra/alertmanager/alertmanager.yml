global:
  resolve_timeout: 5m

route:
  receiver: 'telegram'
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  routes:
    - match:
        severity: critical
      receiver: 'telegram-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'telegram'
    - match:
        team: ml
      receiver: 'telegram-ml'
    - match:
        team: infrastructure
      receiver: 'telegram-infra'

receivers:
  - name: 'telegram'
    webhook_configs:
      - url: 'http://alertmanager-telegram:9080/telegram'
        send_resolved: true

  - name: 'telegram-critical'
    webhook_configs:
      - url: 'http://alertmanager-telegram:9080/telegram'
        send_resolved: true

  - name: 'telegram-ml'
    webhook_configs:
      - url: 'http://alertmanager-telegram:9080/telegram'
        send_resolved: true

  - name: 'telegram-infra'
    webhook_configs:
      - url: 'http://alertmanager-telegram:9080/telegram'
        send_resolved: true

  - name: 'null'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api"
    static_configs:
      - targets: ["trading-api:8000"]
    metrics_path: /metrics

  - job_name: "mlflow"
    static_configs:
      - targets: ["mlflow-exporter:9092"]

  - job_name: "airflow"
    static_configs:
      - targets: ["airflow-exporter:9091"]

  - job_name: "paper-trading"
    static_configs:
      - targets: ["host.docker.internal:8001"]
    metrics_path: /metrics
    scrape_interval: 30s

  - job_name: "trainer"
    static_configs:
      - targets: ["trainer:8002"]
    metrics_path: /metrics
    scrape_interval: 60s

  - job_name: "trading-monitor"
    static_configs:
      - targets: ["trading-monitor:8003"]
    metrics_path: /metrics
    scrape_interval: 60s

version: "3.9"

x-common-env: &common-env
  TZ: "Europe/Moscow"
  LOG_LEVEL: "${LOG_LEVEL:-INFO}"

services:
  mlflow:
    image: python:3.11-slim
    container_name: mlflow
    command: >
      sh -c "pip install mlflow==2.22.0 && mlflow server --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      TZ: "Europe/Moscow"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
    volumes:
      - mlflow_data:/mlflow
    restart: unless-stopped
    networks:
      - trading-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-mlflow}"
      POSTGRES_USER: "${POSTGRES_USER:-mlflow}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-mlflow_password}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mlflow} -d ${POSTGRES_DB:-mlflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - trading-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: trading-api
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000 --workers 4
    env_file:
      - .env
    environment:
      TZ: "Europe/Moscow"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      MLFLOW_TRACKING_URI: "${MLFLOW_TRACKING_URI:-http://mlflow:5000}"
      MLFLOW_ARTIFACT_ROOT: "${MLFLOW_ARTIFACT_ROOT:-s3://moex-trading-mlflow}"
      AWS_ACCESS_KEY_ID: "${YC_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${YC_SECRET_ACCESS_KEY}"
      AWS_REGION: "${YC_REGION:-ru-central1}"
      MLFLOW_S3_ENDPOINT_URL: "${YC_S3_ENDPOINT:-https://storage.yandexcloud.net}"
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    depends_on:
      - mlflow
      - postgres
    restart: unless-stopped
    networks:
      - trading-network

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - trading-network

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - trading-network

  alertmanager-telegram:
    build:
      context: ./infra/alertmanager
      dockerfile: Dockerfile.telegram
    container_name: alertmanager-telegram
    ports:
      - "9080:9080"
    env_file:
      - .env
    environment:
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN}"
      TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID}"
      PORT: "9080"
    restart: unless-stopped
    networks:
      - trading-network

  grafana:
    image: grafana/grafana:11.2.2
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    env_file:
      - .env
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - trading-network

  airflow-init:
    image: ${AIRFLOW_IMAGE:-apache/airflow:2.9.3}
    container_name: airflow-init
    command: db init
    env_file:
      - .env
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: "0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: "no"
    networks:
      - trading-network

  airflow-webserver:
    image: ${AIRFLOW_IMAGE:-apache/airflow:2.9.3}
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: "0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./reports:/opt/airflow/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - trading-network

  airflow-scheduler:
    image: ${AIRFLOW_IMAGE:-apache/airflow:2.9.3}
    container_name: airflow-scheduler
    command: scheduler
    env_file:
      - .env
    environment:
      <<: *common-env
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: "0"
      MLFLOW_TRACKING_URI: "http://host.docker.internal:5000"
      MLFLOW_ARTIFACT_ROOT: "/opt/airflow/mlflow_artifacts"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./models:/opt/airflow/models
      - ./reports:/opt/airflow/reports
      - ~/mlflow_artifacts:/opt/airflow/mlflow_artifacts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - trading-network

  airflow-worker:
    image: ${AIRFLOW_IMAGE:-apache/airflow:2.9.3}
    container_name: airflow-worker
    command: celery worker
    env_file:
      - .env
    environment:
      TZ: "Europe/Moscow"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      MLFLOW_TRACKING_URI: "http://host.docker.internal:5000"
      MLFLOW_ARTIFACT_ROOT: "/opt/airflow/mlflow_data/artifacts"
      AWS_ACCESS_KEY_ID: "${YC_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${YC_SECRET_ACCESS_KEY}"
      AWS_REGION: "${YC_REGION:-ru-central1}"
      MLFLOW_S3_ENDPOINT_URL: "${YC_S3_ENDPOINT:-https://storage.yandexcloud.net}"
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-trading}
      AIRFLOW__CELERY__BROKER_URL: redis://redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY}"
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_UID: "0"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./data:/opt/airflow/data
      - ./mlflow_data:/opt/airflow/mlflow_data
      - ./models:/opt/airflow/models
      - ./reports:/opt/airflow/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - trading-network

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - trading-network

  trading-monitor:
    build:
      context: .
      dockerfile: Dockerfile.monitor
    container_name: trading-monitor
    command: python trading_session_monitor.py
    env_file:
      - .env
    volumes:
      - /tmp:/tmp
    restart: unless-stopped
    networks:
      - trading-network

  trainer:
    image: python:3.11-slim
    container_name: trainer
    command: sh -c "pip install prometheus-client && python /app/trainer_metrics.py"
    volumes:
      - ./trainer_metrics.py:/app/trainer_metrics.py
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - trading-network

  airflow-exporter:
    image: python:3.11-slim
    container_name: airflow-exporter
    command: sh -c "pip install prometheus-client requests && python /app/airflow_exporter.py"
    volumes:
      - ./airflow_exporter.py:/app/airflow_exporter.py
    environment:
      - AIRFLOW_HOST=airflow-webserver
      - PYTHONUNBUFFERED=1
    networks:
      - trading-network
    restart: unless-stopped

  mlflow-exporter:
    image: python:3.11-slim
    container_name: mlflow-exporter
    command: sh -c "pip install prometheus-client requests && python /app/mlflow_exporter.py"
    volumes:
      - ./mlflow_exporter.py:/app/mlflow_exporter.py
    environment:
      - MLFLOW_HOST=mlflow
      - PYTHONUNBUFFERED=1
    networks:
      - trading-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - grafana
      - mlflow
    restart: unless-stopped
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge

volumes:
  postgres_data:
  mlflow_data:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  redis_data:

version: "3.9"

services:
  api:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -e . && uvicorn apps.api.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    restart: unless-stopped

  trainer:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install -e . && python -m apps.trainer.run_stage --stage download_market_data"
    env_file:
      - .env
    volumes:
      - ./:/app
    profiles: ["manual"]

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.2
    ports:
      - "3000:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    restart: unless-stopped
